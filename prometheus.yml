# Prometheus scrape config for BehaviorIQ stack (Grafana uses Prometheus as a datasource).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: behavioriq-ml-service
    metrics_path: /metrics
    static_configs:
      - targets: ["ml-service:8001"]
